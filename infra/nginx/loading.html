<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CodeArena - Initializing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #00f33d;
      --bg: #050507;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'JetBrains Mono', 'Space Mono', monospace;
      background: var(--bg);
      color: #e8e8e8;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .app-loading-screen {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(1200px 500px at 10% -10%, rgba(0, 243, 61, 0.13), transparent 60%),
        radial-gradient(1000px 450px at 100% 120%, rgba(0, 243, 61, 0.08), transparent 60%),
        #050507;
    }
    .app-loading-backdrop {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 100%);
      opacity: 0.5;
    }
    .app-loading-card {
      position: relative;
      width: min(92vw, 460px);
      padding: 28px 24px;
      border: 1px solid rgba(0, 255, 65, 0.18);
      background: rgba(8, 12, 9, 0.72);
      backdrop-filter: blur(8px);
      box-shadow:
        0 0 0 1px rgba(0, 255, 65, 0.07) inset,
        0 18px 70px rgba(0, 0, 0, 0.55),
        0 0 35px rgba(0, 255, 65, 0.08);
      border-radius: 4px;
      text-align: left;
    }
    .app-loading-kicker {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(224, 224, 224, 0.7);
      margin-bottom: 8px;
    }
    .app-loading-brand {
      font-size: 28px;
      font-weight: 700;
      color: #e8e8e8;
      letter-spacing: 0.02em;
      margin-bottom: 16px;
    }
    .app-loading-brand-mark {
      color: var(--accent);
    }
    .app-loading-progress {
      position: relative;
      width: 100%;
      height: 9px;
      border: 1px solid rgba(0, 255, 65, 0.3);
      background: rgba(0, 0, 0, 0.5);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .app-loading-progress::before {
      content: '';
      position: absolute;
      inset: 1px;
      width: 28%;
      background: linear-gradient(90deg, rgba(0, 243, 61, 0.3), rgba(0, 243, 61, 1), rgba(0, 243, 61, 0.3));
      box-shadow: 0 0 18px rgba(0, 255, 65, 0.55);
      animation: app-loading-scan 1.2s ease-in-out infinite;
    }
    .app-loading-text {
      color: rgba(224, 224, 224, 0.78);
      font-size: 13px;
      letter-spacing: 0.03em;
    }
    @keyframes app-loading-scan {
      0% {
        transform: translateX(-130%);
      }
      100% {
        transform: translateX(420%);
      }
    }
  </style>
</head>
<body>
  <div id="loading-page-identifier" style="display:none;"></div>
  <section class="app-loading-screen" aria-live="polite" aria-busy="true">
    <div class="app-loading-backdrop" aria-hidden="true"></div>

    <div class="app-loading-card">
      <p class="app-loading-kicker">System Startup</p>
      <h1 class="app-loading-brand">
        <span class="app-loading-brand-mark">&lt;</span>
        CodeArena
        <span class="app-loading-brand-mark">/&gt;</span>
      </h1>

      <div class="app-loading-progress" role="progressbar" aria-label="Loading application"></div>

      <p class="app-loading-text">Initializing services... Please wait.</p>
    </div>
  </section>

  <script>
    function checkStatus() {
      fetch('/')
        .then(response => {
          if (!response.ok) {
            throw new Error('Not ready');
          }
          return response.text();
        })
        .then(html => {
          // If the retrieved HTML does not have our identifier, reload to show the actual app!
          if (!html.includes('id="loading-page-identifier"')) {
            window.location.reload();
          } else {
            setTimeout(checkStatus, 2000);
          }
        })
        .catch(() => {
          setTimeout(checkStatus, 2000);
        });
    }
    
    setTimeout(checkStatus, 1000);
  </script>
</body>
</html>
