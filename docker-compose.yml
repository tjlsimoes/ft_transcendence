services:
  db:
    image: postgres:18.3-alpine3.23
    container_name: codearena-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codearena

  cache:
    image: redis:8.6.1-alpine3.23
    container_name: codearena-cache
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codearena

  backend:
    image: codearena-backend:1.0
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: codearena-backend
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_SSL_MODE: ${DB_SSL_MODE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - codearena

  frontend:
    image: codearena-frontend:1.0
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codearena-frontend
    depends_on:
      - backend
    networks:
      - codearena

  proxy:
    image: codearena-proxy:1.0
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    container_name: codearena-proxy
    ports:
      - "8000:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - codearena


networks:
  codearena:
    name: codearena
    driver: bridge