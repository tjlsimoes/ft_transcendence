<article class="friends-panel">
  <header class="panel-header">
    <h2>Neural Network [friends]</h2>
  </header>

  <ul class="friends-list">
    @for (friend of friends(); track friend.nickname) {
      <li class="friend-item">
        <div class="friend-main">
          <span class="status-dot" [class.status-dot--duel]="friend.status === 'in-duel'" [class.status-dot--offline]="friend.status === 'offline'"></span>
          <span class="friend-name">{{ friend.nickname }}</span>
        </div>

        <div class="friend-meta">
          <span class="friend-status" [class.friend-status--online]="friend.status === 'online'" [class.friend-status--duel]="friend.status === 'in-duel'">{{ statusLabel(friend.status) }}</span>
          <button class="friend-action" type="button" [disabled]="friend.status !== 'online'">{{ friend.actionLabel }}</button>
        </div>
      </li>
    }
  </ul>
</article>
