<article class="activity-panel">
  <header class="panel-header">
    <h2>System Logs [activity]</h2>
  </header>

  <ul class="log-list">
    @for (entry of logs(); track entry.time + entry.title) {
      <li class="log-item" [class.log-item--success]="entry.level === 'success'" [class.log-item--warning]="entry.level === 'warning'">
        <time class="log-time">{{ entry.time }}</time>
        <p class="log-title">{{ entry.title }}</p>
        <p class="log-message">{{ entry.message }}</p>
      </li>
    }
  </ul>
</article>
