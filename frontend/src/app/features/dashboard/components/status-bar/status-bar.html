<footer class="status-bar">
  <div class="status-left">
    <span class="dot"></span>
    <span>Server: {{ status().server }}</span>
    <span>[{{ status().onlineStatus }}]</span>
    <span>Latency: <span class="ms">{{ status().latency }}</span></span>
  </div>

  <div class="status-right">
    <span>Build: {{ status().build }}</span>
    <span>{{ status().copyright }}</span>
  </div>
</footer>
