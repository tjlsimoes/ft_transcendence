<article class="rank-panel">
  <div class="rank-card">
    <div class="rank-emblem">
      <div class="rank-emblem-inner">
        <span>{{ rank().tierCode }}</span>
      </div>
    </div>

    <p class="rank-league">{{ rank().leagueName }}</p>
    <h1 class="rank-season">{{ rank().seasonLabel }}</h1>
    <p class="rank-series">{{ rank().recentResults }}</p>

    <div class="rank-progress">
      <div class="progress-head">
        <span>{{ rank().progressLabel }}</span>
        <span>{{ rank().currentLp }} / {{ rank().targetLp }} LP</span>
      </div>
      <div class="progress-track" role="progressbar" [attr.aria-valuenow]="rank().currentLp" [attr.aria-valuemin]="0" [attr.aria-valuemax]="rank().targetLp">
        <span class="progress-fill" [style.width.%]="rank().progressPercent"></span>
      </div>
    </div>

    <div class="rank-actions">
      <button class="btn-rank btn-rank--primary" type="button">{{ rank().primaryAction }}</button>
      <button class="btn-rank btn-rank--ghost" type="button">{{ rank().secondaryAction }}</button>
    </div>
  </div>
</article>
