<div class="pane terminal-pane">
	<header class="pane-header">
		<span class="pane-tab">terminal://history</span>
	</header>
	<div class="pane-content terminal-content">
		<div class="terminal-history-scroll">
			<table class="history-table">
				<thead>
					<tr>
						<th>Result</th>
						<th>Opponent</th>
						<th>LP Change</th>
						<th>Time</th>
					</tr>
				</thead>
				<tbody>
					@for (match of matchHistory(); track match.date) {
										<tr>
											<td
												class="history-result"
												[class.victory]="match.result === 'VICTORY'"
												[class.defeat]="match.result === 'DEFEAT'"
												[style.color]="match.result === 'VICTORY' ? '#22c55e' : '#ef4444'">
												{{ match.result }}
											</td>
											<td>{{ match.opponent }}</td>
											<td
												class="history-lp"
												[class.positive]="match.lpChange > 0"
												[class.negative]="match.lpChange < 0"
												[style.color]="match.lpChange >= 0 ? '#22c55e' : '#ef4444'">
												{{ match.lpChange > 0 ? '+' : '' }}{{ match.lpChange }}
											</td>
											<td>{{ match.date }}</td>
										</tr>
									}
				</tbody>
			</table>
		</div>

		<div class="terminal-input">
			<span class="prompt-symbol">></span>
			<span class="prompt-text">/history latest</span>
			<span class="prompt-cursor" aria-hidden="true"></span>
		</div>
	</div>
</div>
