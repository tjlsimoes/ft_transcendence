<section class="player-stats-panel" aria-label="Player statistics">
  <header class="panel-title-row">
    <span class="title-accent" aria-hidden="true"></span>
    <h2 class="panel-title">Player Statistics</h2>
  </header>

  <section class="summary-grid" aria-label="Resumo principal">
    @for (item of summaryStats; track item.id) {
      <article class="summary-card">
        <span class="summary-label">{{ item.label }}</span>
        <strong class="summary-value" [class.highlight]="item.highlight">{{ item.value }}</strong>
      </article>
    }
  </section>

  <section class="record-list" aria-label="Vitorias e derrotas">
    @for (item of recordStats; track item.id) {
      <div class="record-item">
        <span class="record-label">{{ item.label }}</span>
        <span class="record-value" [class.accent]="item.accent">
          {{ item.value }}
          @if (item.id === 'streak') {
            <svg class="streak-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="streak icon">
              <path d="M12.3 2.6C13.7 5.2 12.7 7.3 10.8 8.8C12.7 8.2 14.8 9.4 15.2 11.6C15.7 14.3 13.5 16.6 10.8 16.6C8 16.6 6.1 14.3 6.4 11.6C6.7 9.2 8.8 7.3 10.5 6.1C11.2 5.5 11.9 4.4 12.3 2.6Z" fill="currentColor"/>
              <path d="M15.8 8.4C18.7 10.1 20.1 12.8 19.6 15.6C19 19 16.3 21.4 12.8 21.4C9.2 21.4 6.3 19.1 5.6 15.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          }
        </span>
      </div>
    }
  </section>
</section>
