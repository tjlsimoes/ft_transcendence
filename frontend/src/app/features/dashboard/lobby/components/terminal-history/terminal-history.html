<div class="pane terminal-pane">
	<header class="pane-header">
		<span class="pane-tab">terminal://history</span>
	</header>
	<div class="pane-content terminal-content">
		<div class="terminal-history-scroll">
			<table class="history-table">
				<caption class="sr-only">Recent match history</caption>
				<thead>
					<tr>
						<th>Result</th>
						<th>Opponent</th>
						<th>LP Change</th>
						<th>Time</th>
					</tr>
				</thead>
				<tbody>
					@for (match of matchHistory(); track match.id) {
					<tr>
						<td class="history-result" [class.victory]="match.result === 'VICTORY'"
							[class.defeat]="match.result === 'DEFEAT'">
							{{ match.result }}
						</td>
						<td>{{ match.opponent }}</td>
						<td class="history-lp" [class.positive]="match.lpChange > 0"
							[class.negative]="match.lpChange < 0">
							<span class="lp-indicator" aria-hidden="true">{{ match.lpChange > 0 ? '▲' : '▼' }}</span>
							{{ match.lpChange > 0 ? '+' : '' }}{{ match.lpChange }}
						</td>
						<td>{{ match.date }}</td>
					</tr>
					}
				</tbody>
			</table>
		</div>

		<div class="terminal-input">
			<span class="prompt-symbol" aria-hidden="true">></span>
			<input type="text" class="prompt-input" aria-label="Terminal command input"
				placeholder="Type /help for commands or /history latest..." />
		</div>
	</div>
</div>
