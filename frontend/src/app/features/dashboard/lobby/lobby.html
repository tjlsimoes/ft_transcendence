<section class="lobby-shell">
  <div class="lobby-grid">
    <div class="lobby-left">
      <app-player-stats [stats]="playerStats" />
      <app-friends-list [friends]="friends" />
    </div>

    <div class="lobby-center">
      <app-rank-display [rank]="rank" />

      <article class="lobby-panel transmissions-panel">
        <header class="panel-header">
          <h2 class="panel-title">Active Transmissions [live]</h2>
          <span class="panel-meta">{{ activeDuelsCount }} duels active</span>
        </header>

        <div class="transmissions-grid">
          @for (duel of transmissions; track duel.leftPlayer + duel.rightPlayer) {
            <div class="duel-card">
              <div class="duel-top">
                <span class="duel-mode">{{ duel.difficulty }} // {{ duel.language }}</span>
                <span class="duel-timer">{{ duel.timer }}</span>
              </div>

              <div class="duel-vs">
                <span class="duel-player">{{ duel.leftPlayer }}</span>
                <span class="duel-divider">vs</span>
                <span class="duel-player">{{ duel.rightPlayer }}</span>
              </div>

              <button class="duel-watch" type="button">Watch Duel</button>
            </div>
          }
        </div>
      </article>
    </div>

    <div class="lobby-right">
      <app-activity-log [logs]="logs" />
    </div>
  </div>

  <app-status-bar [status]="status" />
</section>
