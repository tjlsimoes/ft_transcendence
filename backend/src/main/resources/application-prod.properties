# Prod Profile - Security and performance focused
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${POSTGRES_DB}?sslmode=${DB_SSL_MODE}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# User avatar storage
user.avatar.storage-dir=${USER_AVATAR_STORAGE_DIR:/app/uploads/avatars}
user.avatar.base-url=${USER_AVATAR_BASE_URL:/api/users/avatars}
user.avatar.default-filename=${USER_AVATAR_DEFAULT_FILENAME:default-avatar.svg}
user.avatar.default-url=${USER_AVATAR_DEFAULT_URL:/api/users/avatars/default-avatar.svg}
