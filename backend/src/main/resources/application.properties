spring.application.name=code-arena-backend
server.port=${BACKEND_PORT:8080}
spring.profiles.active=${BACKEND_PROFILES:prod}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Judge0 service settings
judge.judge0-url=${JUDGE0_URL:http://localhost:2358}
judge.language-id=${JUDGE0_LANGUAGE_ID:1}
judge.language-map.c=${JUDGE0_C_LANGUAGE_ID:${JUDGE0_LANGUAGE_ID:1}}
judge.cpu-time-limit=${JUDGE0_CPU_TIME_LIMIT:10}
judge.memory-limit=${JUDGE0_MEMORY_LIMIT:128000}
judge.auth-token=${JUDGE0_AUTH_TOKEN:}
